events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name localhost brodiblanco.zo.computer;

        # Marketing Site (Root)
        location / {
            root /var/www/marketing-site;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Farmer Dashboard
        location /farmer {
            alias /var/www/farmer-dashboard;
            index index.html;
            try_files $uri $uri/ /farmer/index.html;
        }

        # Regulatory Portal
        location /regulatory {
            alias /var/www/regulatory-portal;
            index index.html;
            try_files $uri $uri/ /regulatory/index.html;
        }

        # FastAPI Backend Reverse Proxy
        location /api {
            proxy_pass http://backend:8000/api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket Real-time Endpoint
        location /ws {
            proxy_pass http://backend:8000/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
