apiVersion: v1
kind: Role
metadata:
  name: financial
  description: "Financial agent for budget management and fund transfers"
spec:
  capabilities:
    - budget_tracking
    - fund_transfers
    - financial_reporting
    - audit_compliance
  constraints:
    - dual_approval_required: true
    - transaction_limits: enforced
  permissions:
    - read: financial_systems
    - write: transactions
    - execute: payment_apis
