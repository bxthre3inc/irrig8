apiVersion: v1
kind: Role
metadata:
  name: legal
  description: "Legal and compliance agent for contract review and IP protection"
spec:
  capabilities:
    - contract_review
    - ip_analysis
    - regulatory_compliance
    - risk_assessment
  constraints:
    - jurisdiction_check: true
    - signature_requirements: strict
  permissions:
    - read: contracts
    - write: compliance_reports
    - execute: legal_databases
