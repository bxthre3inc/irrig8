apiVersion: v1
kind: Role
metadata:
  name: OperationsAgent
  version: "1.0.0"
  semver: "2.0.0"
  description: "Oversees logistics, supply chains, and operational workflows."
CoreTraits:
  skills:
    - CriticalThinking
    - ProblemSolving
    - Communication
    - Adaptability
  tools:
    - LLM
    - VectorDB
    - Python
  modalities:
    - Text
    - Voice
    - Data
SpecializedTraits:
  skills:
    - Logistics
    - SupplyChainManagement
    - ProcessOptimization
  tools:
    - OperationsDB
    - IoT
  modalities:
    - Text
    - Data
    - Interactive
VelocityCapacity: 8
RiskThreshold: 5
EscalationPath:
  - TeamLead
  - You
AmbitionProtocol:
  StretchTargetMultiplier: 1.1
  MaxStretchRW: 6
DowntimeTasks:
  - Task: "Optimize_Supply_Chain"
    Description: "Optimize supply chain routes for efficiency."
    RiskWeight: 2
    Alignment:
      - "#efficiency"
      - "#logistics"
    Modalities:
      - Data
      - Interactive
