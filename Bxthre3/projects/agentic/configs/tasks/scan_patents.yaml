apiVersion: v1
kind: Task
metadata:
  name: "Scan_New_Patents"
  version: "1.0.0"
  semver: "2.0.0"
  description: "Scan patent databases for new filings in the domain."
Prerequisites:
  Access:
    - PatentDB
  Requires:
    - LLM
VelocityRequirement:
  Min: 5
  Stretch: 7
RiskWeight: 1
EscalationPath: []
Alignment:
  - "#innovation"
Modalities:
  Input:
    - Text
    - Data
  Output:
    - Text
    - Data
CascadingTriggers:
  - OnFindMatch: "Analyze_Patent_Cluster"
