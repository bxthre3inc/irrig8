version: '3.8'
services:
  redis:
    image: redis:6.2
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  agentic1:
    build:
      context: .
      dockerfile: docker/Dockerfile.agent
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - .:/app
    ports:
      - "8000:8000"
volumes:
  redis_data: