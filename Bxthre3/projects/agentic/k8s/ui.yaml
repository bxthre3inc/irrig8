# Agentic1 UI Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: agentic
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
        - name: ui
          image: agentic1/ui:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: ui
  namespace: agentic
spec:
  selector:
    app: ui
  ports:
    - port: 80
      targetPort: 3000
  type: LoadBalancer