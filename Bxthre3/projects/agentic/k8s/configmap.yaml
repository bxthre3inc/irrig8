apiVersion: v1
kind: ConfigMap
metadata:
  name: agentic-system-config
  namespace: agentic
data:
  AGENT_ROLES: "researcher,developer,reviewer,manager,qa,legal,financial"
  TASK_TYPES: "research,development,review,deployment"
  HIERARCHY_LEVELS: "strategic,tactical,operational"
  HITL_TRIGGERS: "critical_decision,quality_gate,exception_handling,legal_review,financial_approval"
  SUBAGENT_SPECIALIZATIONS: "web_researcher,code_generator,security_auditor,deployment_orchestrator"
  LOG_LEVEL: "INFO"
  MAX_CONCURRENT_TASKS: "10"
  DEFAULT_TIMEOUT: "3600"
