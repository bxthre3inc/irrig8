apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentic-redis
  namespace: agentic
spec:
  replicas: 3
  selector:
    matchLabels:
      app: agentic-redis
  template:
    metadata:
      labels:
        app: agentic-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: agentic-redis
  namespace: agentic
spec:
  selector:
    app: agentic-redis
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
  clusterIP: None
