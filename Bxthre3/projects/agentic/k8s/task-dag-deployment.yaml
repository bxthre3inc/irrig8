apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-dag-service
  namespace: agent-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-dag-service
  template:
    metadata:
      labels:
        app: task-dag-service
    spec:
      containers:
      - name: task-dag
        image: task-dag-image:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
version: 1.0.0
version: 1.0.0