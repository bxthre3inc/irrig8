# Agentic Kubernetes Values — scales to 10,000+ agents
# Helm: helm install agentic ./k8s/agentic -n agentic -f values.yaml

namespace: agentic

replicaCount: 3

image:
  api:
    repository: agentic/api
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  ollama:
    repository: ollama/ollama
    tag: latest

service:
  type: ClusterIP
  apiPort: 80
  ollamaPort: 11434

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 500  # For 10,000+ agents: set to 500+ (each pod handles ~20 agents)
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  # Per-agent resource budget
  agentCPUm: 50m     # 50 millicores per agent
  agentMemoryMi: 128 # 128 MiB per agent

resources:
  api:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  ollama:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 4000m
      memory: 16Gi
      nvidia.com/gpu: "1"

persistence:
  enabled: true
  audit:
    size: 1Gi
  telemetry:
    size: 5Gi
  ollama:
    size: 20Gi

ingress:
  enabled: true
  className: nginx
  host: agentic.brodiblanco.com

config:
  agenticVersion: "1.0.0"
  ollamaModel: llama3.2
  hitlMode: active
  logLevel: INFO
