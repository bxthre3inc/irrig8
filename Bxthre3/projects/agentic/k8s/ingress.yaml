apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-ingress
  namespace: agent-system
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: agent.example.com
    http:
      paths:
      - path: /hitl
        pathType: Prefix
        backend:
          service:
            name: hitl-service
            port:
              number: 8080
      - path: /task-dag
        pathType: Prefix
        backend:
          service:
            name: task-dag-service
            port:
              number: 8080
version: 1.0.0
version: 1.0.0