<!-- Section: Legal & Terms -->
<div class="section" id="section-{INDEX}">
  <div class="section-title">⚖️ Legal & Terms</div>
  <div class="form-group checkbox-group">
    <input type="checkbox" id="acceptTerms" name="acceptTerms" required>
    <label for="acceptTerms">I accept the Terms & Conditions <span class="required">*</span><br>
    <small style="color:#666">I agree to the terms of service and understand that this application does not guarantee funding.</small></label>
  </div>
  <div class="form-group">
    <label for="signature">Digital Signature (type your full name) <span class="required">*</span></label>
    <input type="text" id="signature" name="signature" required placeholder="John Doe" minlength="2">
  </div>
</div>
