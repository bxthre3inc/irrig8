<!-- Section: Personal Info -->
<div class="section" id="section-{INDEX}">
  <div class="section-title">👤 Personal Info</div>
  <div class="form-group">
    <label for="name">Full Name <span class="required">*</span></label>
    <input type="text" id="name" name="name" required placeholder="John Doe" minlength="2">
  </div>
  <div class="form-group">
    <label for="email">Email <span class="required">*</span></label>
    <input type="email" id="email" name="email" required placeholder="john@example.com" pattern="[^\s@]+@[^\s@]+\.[^\s@]+">
  </div>
  <div class="form-group">
    <label for="phone">Phone</label>
    <input type="tel" id="phone" name="phone" placeholder="+1 (555) 123-4567">
  </div>
  <div class="form-group">
    <label for="ownership">% Ownership <span class="required">*</span></label>
    <input type="number" id="ownership" name="ownership" required min="0" max="100" step="0.01" placeholder="50">
  </div>
</div>
