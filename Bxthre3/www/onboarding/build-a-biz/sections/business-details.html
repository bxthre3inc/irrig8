<!-- Section: Business Details -->
<div class="section" id="section-{INDEX}">
  <div class="section-title">🏢 Business Details</div>
  <div class="form-group">
    <label for="businessName">Business Name <span class="required">*</span></label>
    <input type="text" id="businessName" name="businessName" required placeholder="My Awesome LLC">
  </div>
  <div class="form-group">
    <label for="industry">Industry <span class="required">*</span></label>
    <select id="industry" name="industry" required>
      <option value="">Select an industry</option>
      <option value="tech">Technology</option>
      <option value="retail">Retail / E-commerce</option>
      <option value="services">Professional Services</option>
      <option value="healthcare">Healthcare</option>
      <option value="finance">Finance</option>
      <option value="agriculture">Agriculture</option>
      <option value="manufacturing">Manufacturing</option>
      <option value="other">Other</option>
    </select>
  </div>
  <div class="form-group">
    <label for="location">Location</label>
    <input type="text" id="location" name="location" placeholder="City, State">
  </div>
  <div class="form-group">
    <label for="description">Business Description</label>
    <textarea id="description" name="description" placeholder="What does your business do?" minlength="10"></textarea>
  </div>
</div>
