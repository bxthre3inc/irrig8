<!-- Section: Grant Readiness -->
<div class="section" id="section-{INDEX}">
  <div class="section-title">💰 Grant Readiness</div>
  <div class="form-group">
    <label for="story">Business Story <span class="required">*</span></label>
    <textarea id="story" name="story" required placeholder="Tell us about your business journey, why you started, and what problem you're solving..."></textarea>
  </div>
  <div class="form-group">
    <label for="fundUsage">How would you use grant funds? <span class="required">*</span></label>
    <textarea id="fundUsage" name="fundUsage" required placeholder="Describe exactly how you'd invest grant money in your business..."></textarea>
  </div>
  <div class="form-group">
    <label for="revenue">Monthly Revenue ($)</label>
    <input type="number" id="revenue" name="revenue" min="0" placeholder="0">
  </div>
  <div class="form-group">
    <label for="traction">Current Traction</label>
    <textarea id="traction" name="traction" placeholder="What's working? Any milestones, customers, or early wins?"></textarea>
  </div>
</div>
