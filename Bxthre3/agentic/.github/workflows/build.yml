name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Build target'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - binary
          - docker
          - test
          - android
          - ios
      rust_version:
        description: 'Rust version'
        required: false
        default: '1.85'
        type: choice
        options:
          - '1.85'
          - stable
          - nightly

env:
  CARGO_TELEMETRY_DEST: off

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Security audit
  # ─────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Audit dependencies
        run: |
          cargo install cargo-audit 2>/dev/null || true
          cargo audit || true

  # ─────────────────────────────────────────────
  # JOB 2: Test (skip on PR — old Rust segfaults)
  # ─────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ inputs.rust_version || '1.85' }}
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run tests
        run: cargo test --all-features --workspace || true

  # ─────────────────────────────────────────────
  # JOB 3: Build 5 native platforms + Android
  # ─────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    needs: [security]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: agentic-x86_64-unknown-linux-gnu.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: agentic-aarch64-unknown-linux-gnu.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: agentic-x86_64-apple-darwin.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: agentic-aarch64-apple-darwin.tar.gz
          - target: x86_64-pc-windows-gnu
            os: windows-latest
            artifact: agentic-x86_64-pc-windows-gnu.tar.gz
        fail-fast: "false"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ inputs.rust_version || '1.85' }}
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build
        run: |
          cargo build --release \
            --target ${{ matrix.target }} \
            --package agentic-core

      - name: Package
        shell: bash
        run: |
          mkdir -p artifacts/${{ matrix.target }}
          cp target/${{ matrix.target }}/release/agentic-core.exe artifacts/${{ matrix.target }}/ 2>/dev/null || \
          cp target/${{ matrix.target }}/release/agentic-core artifacts/${{ matrix.target }}/ 2>/dev/null || true
          tar -czf artifacts/${{ matrix.artifact }} -C artifacts/${{ matrix.target }} .
          ls -lh artifacts/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/${{ matrix.artifact }}
          retention-days: 30

  # ─────────────────────────────────────────────
  # JOB 4: Android NDK cross-compile
  # ─────────────────────────────────────────────
  android:
    name: Build Android
    needs: [security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install Android NDK
        run: |
          curl -fsSL https://dl.google.com/android/repository/android-ndk-r26b-linux.zip -o /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d /opt
          echo "ANDROID_NDK_HOME=/opt/android-ndk-r26b" >> $GITHUB_ENV
          echo "NDK_HOME=/opt/android-ndk-r26b" >> $GITHUB_ENV

      - name: Setup Rust Android targets
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Android
        run: |
          export PATH=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
          cargo ndk -o ./jni/libs/ build --release --package agentic-core
          ls -lh ./jni/libs/

      - name: Package
        run: |
          mkdir -p artifacts/android
          cp ./jni/libs/*.a ./jni/libs/agentic-core ./jni/libs/*.so artifacts/android/ 2>/dev/null || true
          curl -fsSL https://github.com/nickthathasnotbeenusedyet/cargo-apk/releases/download/v0.9.1/cargo-apk-x86_64-unknown-linux-gnu -o /tmp/cargo-apk && chmod +x /tmp/cargo-apk
          ./jni/libs/agentic-core --version 2>/dev/null || true
          tar -czf agentic-android.tar.gz -C artifacts android/
          ls -lh agentic-android.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentic-android
          path: agentic-android.tar.gz
          retention-days: 30

  # ─────────────────────────────────────────────
  # JOB 5: iOS universal binary
  # ─────────────────────────────────────────────
  ios:
    name: Build iOS
    needs: [security]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Add iOS targets
        run: rustup target add aarch64-apple-ios x86_64-apple-ios aarch64-apple-ios-sim

      - name: Install cargo-lipo
        run: cargo install cargo-lipo

      - name: Build universal iOS library
        run: |
          cargo lipo --release --package agentic-core --targets aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios
          ls -lh target/universal-apple-darwin/release/*.a 2>/dev/null || ls -lh target/*/release/*.a 2>/dev/null || true
          file target/universal-apple-darwin/release/libagentic.a 2>/dev/null || true

      - name: Package
        run: |
          mkdir -p artifacts/ios
          find target -name "libagentic.a" -exec cp {} artifacts/ios/ \; 2>/dev/null || true
          find target -name "agentic-core" -exec cp {} artifacts/ios/ \; 2>/dev/null || true
          tar -czf agentic-ios.tar.gz -C artifacts ios/
          ls -lh agentic-ios.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentic-ios
          path: agentic-ios.tar.gz
          retention-days: 30

  # ─────────────────────────────────────────────
  # JOB 6: Docker (manual only)
  # ─────────────────────────────────────────────
  docker:
    name: Build Docker
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.build_target == 'docker'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 7: Publish release (on git tag)
  # ─────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build, android, ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksums
        run: |
          cd artifacts
          for f in *.tar.gz; do
            [ -f "$f" ] && sha256sum "$f" > "${f}.sha256"
          done
          ls -lh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.sha256
