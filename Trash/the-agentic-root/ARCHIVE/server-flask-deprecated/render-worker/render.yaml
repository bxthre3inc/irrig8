services:
  - type: web
    name: agentic-render-worker
    runtime: bun
    plan: free
    buildCommand: bun install
    startCommand: bun src/worker.ts
    envVars:
      - key: CONTROL_PLANE
        value: https://brodiblanco.zocomputer.io/api/agentic
      - key: NODE_ID
        generateValue: true
      - key: REGION
        value: us-east
      - key: THRESHOLD_MODE
        value: "true"
      - key: PASSWORD
        sync: false
